<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./js/script.js">
</head>

<body>


    <header class="form-header">
        <div class="container container--flex">
            <img src="../images/Vector (1).svg" alt="imagem" class="form-header__image-perfil" />
            <h1 class="form-header__titulo">Contact Form</h1>
            <p class="form-header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="form-contact" action="">


                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="">Nome</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--metade" type="text" id="nome" name="nome"
                            placeholder="nome">
                        <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome"
                            name="sobrenome" placeholder="sobrenome">
                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="">Email</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--inteiro" type="text" id="Email"
                            name="ex. maismais@gmail.com" placeholder="ex. maismais@gmail.com">
                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="">Telefone</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="País" name="Pais"
                            placeholder="+55">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="DDD" name="DDD"
                            placeholder="DDD">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="Telefone"
                            name="Telefone" placeholder="ex: 5555-5555">
                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="">Endereço</label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--quarto" type="number" id="CEP"
                            name="CEP" placeholder="CEP:02346-726" onblur="buscarEndereco(this.value);">
                        <input class="form-contact__input form-contact__input--metade" type="text" id="RuaCasa"
                            name="RuaCasa" placeholder="Rua lá">
                        <input class="form-contact__input form-contact__input--quarto" type="text" id="nCasa"
                            name="nCasa" placeholder="ex: 5555">
                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for=""></label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="Complemento"
                            name="Complemento" placeholder="Apt 7 Bloco 2">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="Bairro"
                            name="Bairro" placeholder="Bairro">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="Cidade"
                            name="Cidade" placeholder="Cidade">
                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for=""></label>
                    </div>

                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--terco" type="text" id="Estado"
                            name="Estado" placeholder="Estado">

                    </div>
                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="">Anotações</label>
                    </div>

                    <div class="form-contact__col-b">
                        <textarea class="form-contact__input form-contact__input--anotacoes" type="text"
                            id="Anotações" name="Anotações"
                            placeholder="Suas anotações aqui"></textarea>

                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for=""></label>
                    </div>
                    <div class="form-contact__col-b form-contact__linha-botao">
                        <input class="form-contact__input  form-contact__input--metade btn" onclick="validarFormulario()" type="button" value="Cadastrar">
                        <input class="form-contact__input  form-contact__input--metade btn" type="submit" value="Limpar">
            
                    </div>

                </div>


            </form>
        </div>




    </main>

    <!-- <footer>
        Todos os direitos reservados
    </footer> -->
    <script src="./js/script.js"></script>
</body>

</html>
